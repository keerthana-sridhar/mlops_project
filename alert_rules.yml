groups:
  - name: malaria_alerts
    rules:

      - alert: DriftDetected
        expr: drift_detected > 0.5
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "Data drift detected"
          description: "Combined drift signal crossed the configured backend threshold."

      - alert: HighOODRate
        expr: ood_rate > 0.2
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "OOD rate above 20%"
          description: "Too many incoming samples are falling outside the training distribution."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status="500"}[5m]) 
              / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API error rate > 5%"

      - alert: SlowInference
        expr: histogram_quantile(0.95,
              rate(inference_latency_seconds_bucket[5m])
              ) > 0.2
        for: 5m
        labels:
          severity: warning
      - alert: HighInvalidInputRate
        expr: rate(invalid_image_uploads_total[5m]) 
              / rate(http_requests_total{endpoint="/predict"}[5m]) > 0.4
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High invalid input rate"
          description: "More than 40% of incoming requests are invalid inputs."
